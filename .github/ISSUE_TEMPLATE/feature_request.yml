name: Feature request
description: Suggest new skill coverage or an improvement
labels: ["type:enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What's missing or could be better?
      description: The task you wanted an agent to do, and where the skills fell short (uncovered command group, weak routing, missing workflow).
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What the skill should say or do. If it involves a `ppds` command, name it.

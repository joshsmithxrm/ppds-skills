name: live-evals

# Behavioral (LLM-judged) eval suite — power-platform-developer-suite#... / ppds-skills#4.
#
# OPT-IN and COST-AWARE: this job drives `claude` headless (billed) and calls
# the Anthropic API for the semantic judge, so it runs ONLY on manual dispatch,
# never on push or pull_request. The mechanical half — harness self-test +
# scenario validation against the captured surface — runs for free on every PR
# inside the `skill-evals` workflow (evals/live/_selftest.py).
#
# Required secret: ANTHROPIC_API_KEY (used both to authenticate Claude Code
# headless and to call the semantic judge).

on:
  workflow_dispatch:
    inputs:
      filter:
        description: 'Only run one skill (e.g. ppds-query); blank = all'
        required: false
        default: ''

jobs:
  live:
    # Self-hosted while the repo is private (see skill-evals notes). On going
    # public, switch to `runs-on: ubuntu-latest`.
    runs-on: [self-hosted, Linux]
    steps:
      - uses: actions/checkout@v4

      - name: Install Claude Code (headless driver)
        shell: bash
        run: npm install -g @anthropic-ai/claude-code

      - name: Run live evals
        shell: bash
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PPDS_LIVE_MODEL: opus
          # plan mode = read-only: skills load and commands are proposed, but
          # nothing executes against Dataverse and no auth profile is present.
          PPDS_LIVE_PERMISSION_MODE: plan
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.filter }}" ]; then
            ARGS="--filter ${{ github.event.inputs.filter }}"
          fi
          python3 evals/live/run_live_evals.py $ARGS

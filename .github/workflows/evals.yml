name: skill-evals

# Zero-dependency static eval suite: frontmatter shape, code-block correctness,
# command/flag existence against the captured --help surface, MCP tool-name
# existence, link integrity, and version consistency between skills,
# captured-help, and the plugin manifests. The matrix runs the pure-Python
# suite on both Linux and Windows, matching the Windows/Linux agent audience.

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the suite only reads the checkout; it never writes to the
# repo, comments on PRs, or publishes. Pinning this here makes the token scope
# independent of the org/repo default-permissions setting.
permissions:
  contents: read

jobs:
  static-checks:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.3.0
        with:
          python-version: '3.8'  # the documented floor; setup-python puts `python` on PATH on all OSes

      # `ppds` is intentionally NOT installed here: check_skills.py validates the
      # skills against the committed captured-help/ surface, so the suite stays
      # zero-dependency and the capture-freshness gate self-skips (no CLI on PATH).
      - name: Run skill evals
        shell: bash
        run: |
          python evals/check_skills.py
          python evals/live/_selftest.py
